# Recursive chunking candidate (B). Identical to configs/baseline.yaml except the
# chunking strategy + size, so `rbench compare` isolates the effect of chunking.
name: recursive_800

chunking:
  type: recursive
  size: 800
  overlap: 150

embedding:
  type: openai_small

retrieval:
  type: dense

generation:
  type: openai
  model: gpt-4o-mini

top_k_retrieve: 20
top_k_final: 5
seed: 42
