# Fixed-size chunking baseline (A). Compare against configs/recursive_800.yaml —
# only the `chunking` block differs, so any metric delta is due to chunking alone.
name: fixed_512

chunking:
  type: fixed
  size: 200
  overlap: 64

embedding:
  type: openai_small

retrieval:
  type: dense

generation:
  type: openai
  model: gpt-4o-mini

top_k_retrieve: 20
top_k_final: 5
seed: 42
